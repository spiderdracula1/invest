<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        #chat{
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: end;
            margin-bottom: 60px;
        }
        #wrapper{
            position: relative;
        }
        #send{
            width: 100%;
            height: 60px;
            position: fixed;
            bottom: 0;
            display: flex;
        }
        #send_message{
            width: 150px;
            font-size: 20px;
            color: white;
            background-color: tomato;
            cursor: pointer;
        }
        #message{
            font-size: 20px;
            line-height: 60px;
            width: inherit;
        }
        .message{
            color:rgb(228, 228, 228);
            width: fit-content;
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
        }
        .friend{
            background-color:rgb(85, 130, 0);
            border: 1px solid rgb(152, 175, 23);
        }
        .me{
            background-color:indigo;
            border: 1px solid rgb(39, 0, 66);
            align-self:flex-end;
        }
        .author{
            display:block;
            font-weight: bold;
            text-decoration-line:underline ;
            padding-bottom: 10px;
            font-size: large;
        }
        .time{
            font-size:x-small;
            display: block;
            text-align: right;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <div id="chat">
            <div class ="message">
                Привет мир!
            </div>
            <div id="send">
            <input type ="text" id="message">
            <input type="button" id="send_message" value="отправить">
            </div> 
        </div>
    </div>
    <script>
        const me ="ww";
        function getMessageFromServer(sec) {
            let xmlhttp = new XMLHttpRequest();
            let url = 'https://chat.9pr.ru/message/'+sec;
            xmlhttp.open('GET',url);
            xmlhttp.send(null);
            xmlhttp.onload = ()=>{
                let data = xmlhttp.responseText;
                data = JSON.parse(data);
                if (data.error!== undefined){
                }else {

                    for(let i in data){
                        if (document.querySelector('#message-'+data[i].id)== null){
                            newMessage(data[i]);
                        }
                    }
                }
            }
            localStorage.setItem('time',Math.floor(Date.now()/1000));
        }
        function newMessage({author,id, message,time}){
            let div = document.createElement('div');
            div.id = "message-"+id;
            if (author ===undefined || author === me){
                div.className = "message me";
            }else {
                div.className="message friend";
            }
            let authorSpan;
            if (author!==me) {
                authorSpan = document.createElement("span");
                authorSpan.className ="author";
                authorSpan.textContent = author;
                div.appendChild(authorSpan);

            }
            let textSpan;
            textSpan = document.createElement("span");
            textSpan.className ="text";
            textSpan.textContent = message;
            div.appendChild(textSpan);
            let timeSpan;
            timeSpan = document.createElement("span");
            timeSpan.className ="time";
            let date ;
            date = new Date(time*1000);
            timeSpan.textContent = `
            ${date.getHours()}:
            ${date.getMinutes()<10 ? '0'+date.getMinutes():date.getMinutes()}:
            ${date.getSeconds()<10 ? '0'+date.getSeconds():date.getSeconds()}
            ` ;
            div.appendChild(timeSpan);

            document.querySelector('#chat').appendChild(div);
            window.scrollTo({
                top:Math.ceil(document.querySelector('#chat').scrollHeight),
                behavior: 'smooth',

            })
        }
        function sendMessageToServer(author,message){
            let xmlhttp =new XMLHttpRequest();
            let url = 'https://chat.9pr.ru/message';
            xmlhttp.open('POST',url);
            xmlhttp.setRequestHeader("Content-Type","application/json;charset=UTF-8");
            let send ={
                author:author, message:message
            }
            xmlhttp.send(JSON.stringify(send));
            xmlhttp.onload =() =>{
                let data = xmlhttp.responseText;
                data=JSON.parse(data);
                if (data.error!==undefined){
                    console.error(data.error);
                }else{
                    newMessage({id:data.id,message,author:me,time:Math.floor(Date.now()/1000)});
                }
            }
        }
        function sendMessage(e){
            let message = document.querySelector('#message');
            let text = message.value;
            if (text.trim().length>0) {
                sendMessageToServer(me, text);
                message.value='';
            }
        }
        function sendMessageByEnter(e){
            console.log(e);
            if(e.code == "Enter" || e.code=="NumpadEnter" ){
                sendMessage(e);
            }
        }
        window.onload =() =>{
            localStorage.setItem('time',Math.floor(Date.now()/1000));
            document.querySelector('#send_message').onclick =sendMessage ;
            document.querySelector('#message').onkeyup =sendMessageByEnter; 
            getMessageFromServer(0);
            setInterval(
                () =>{
                    getMessageFromServer(0);
                },2000
            );
        }
    </script>
</body>
</html>
