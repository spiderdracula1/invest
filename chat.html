<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        #wrapper{
            position: relative;
        }
        #send{
            width: 100%;
            height: 60px;
            position: fixed;
            bottom: 0;
            display: flex;
        }
        #send_message{
            width: 150px;
            font-size: 20px;
            color: white;
            background-color: tomato;
            cursor: pointer;
        }
        #message{
            font-size: 20px;
            line-height: 60px;
            width: inherit;
        }
        .message{
            background-color:indigo;
            color:rgb(228, 228, 228);
            width: fit-content;
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: 3px solid rgb(39, 0, 66);
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <div id="chat">
            <div class ="message">
                Привет мир!
            </div>
            <div id="send">
            <input type ="text" id="message">
            <input type="button" id="send_message" value="отправить">
            </div> 
        </div>
    </div>
    <script>
        function newMessage(text){
            let div = document.createElement('div');
            div.className = "message";
            div.textContent = text;
            document.querySelector('#chat').appendChild(div)
        }
        function sendMessage(e){
            let message = document.querySelector('#message');
            let text = message.value;
            if (text.trim().length>0) {
                newMessage(text);
                message.value="";
            }
        }
        function sendMessageByEnter(e){
            console.log(e);
            if(e.code == "Enter" || e.code=="NumpadEnter" ){
                sendMessage(e);
            }
        }
        window.onload =() =>{
            document.querySelector('#send_message').onclick =sendMessage ;
            document.querySelector('#message').onkeyup =sendMessageByEnter; 
        }
    </script>
</body>
</html>
